apiVersion: apps/v1
kind: Deployment
metadata:
  name: thanawy-deployment
  labels:
    app: thanawy
spec:
  replicas: 3
  revisionHistoryLimit: 3
  minReadySeconds: 10
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxUnavailable: 0
      maxSurge: 1
  selector:
    matchLabels:
      app: thanawy
  template:
    metadata:
      labels:
        app: thanawy
    spec:
      # Security: Disable automounting of service account token to reduce attack surface
      automountServiceAccountToken: false
      terminationGracePeriodSeconds: 60
      containers:
        - name: thanawy-container
          image: thanawy-app:latest
          imagePullPolicy: Always
          # Security: Prevent privilege escalation
          securityContext:
            allowPrivilegeEscalation: false
            runAsNonRoot: true
            runAsUser: 1000
            capabilities:
              drop:
                - ALL
            readOnlyRootFilesystem: false
          ports:
            - containerPort: 3000
          env:
            - name: NODE_ENV
              value: "production"
            - name: DATABASE_URL
              valueFrom:
                secretKeyRef:
                  name: thanawy-secrets
                  key: DATABASE_URL
            - name: REDIS_URL
              valueFrom:
                secretKeyRef:
                  name: thanawy-secrets
                  key: REDIS_URL
            - name: JWT_SECRET
              valueFrom:
                secretKeyRef:
                  name: thanawy-secrets
                  key: JWT_SECRET
            - name: NEXT_PUBLIC_APP_NAME
              value: "Thanawy"
            - name: NODE_OPTIONS
              value: "--max-old-space-size=1024"
          resources:
            requests:
              cpu: "500m"
              memory: "768Mi"
              # Reliability: Specify storage request to ensure sufficient disk space
              ephemeral-storage: "1Gi"
            limits:
              cpu: "2000m"
              memory: "2Gi"
              ephemeral-storage: "2Gi"
          readinessProbe:
            httpGet:
              path: /api/readyz
              port: 3000
            initialDelaySeconds: 15
            periodSeconds: 5
            timeoutSeconds: 3
            failureThreshold: 6
          livenessProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            initialDelaySeconds: 30
            periodSeconds: 15
            timeoutSeconds: 3
            failureThreshold: 3
          startupProbe:
            httpGet:
              path: /api/healthz
              port: 3000
            periodSeconds: 10
            timeoutSeconds: 3
            failureThreshold: 18

apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-config
  labels:
    app: pgbouncer
data:
  pgbouncer.ini: |
    [databases]
    thanawy = host=postgresql-primary port=5432 dbname=thanawy pool_mode=transaction

    [pgbouncer]
    listen_port = 6432
    listen_addr = *
    auth_type = md5
    auth_file = /etc/pgbouncer/userlist.txt
    logfile = /var/log/pgbouncer/pgbouncer.log
    pidfile = /var/run/pgbouncer/pgbouncer.pid
    admin_users = pgbouncer

    # Connection Pooling Settings
    default_pool_size = 50
    min_pool_size = 10
    reserve_pool_size = 5
    reserve_pool_timeout = 3
    max_client_conn = 1000

    # Timeouts
    server_lifetime = 3600
    server_idle_timeout = 600
    server_connect_timeout = 15
    server_login_retry = 15
    query_timeout = 30
    query_wait_timeout = 30
    client_idle_timeout = 0
    client_login_timeout = 60

    # DNS
    dns_max_ttl = 15
    dns_zone_check_period = 0
    dns_nxdomain_ttl = 15

    # Logging
    log_connections = 1
    log_disconnections = 1
    log_pooler_errors = 1

    # Stats
    stats_period = 60
    stats_users = pgbouncer

    # Security
    tcp_keepalive = 1
    tcp_keepcnt = 5
    tcp_keepidle = 30
    tcp_keepintvl = 10
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: pgbouncer-userlist
  labels:
    app: pgbouncer
data:
  userlist.txt: |
    "thanawy_user" "md5password_hash_here"
    "pgbouncer" "md5admin_password_hash_here"
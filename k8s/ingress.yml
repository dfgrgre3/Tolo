apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: thanawy-ingress
  labels:
    app: thanawy
  annotations:
    # SSL Redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Rate Limiting
    nginx.ingress.kubernetes.io/limit-rps: "100"
    nginx.ingress.kubernetes.io/limit-burst-multiplier: "5"
    # Proxy Settings
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/proxy-read-timeout: "60"
    nginx.ingress.kubernetes.io/proxy-send-timeout: "60"
    # CORS (if needed for separate frontend)
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://thanawy.app"
    nginx.ingress.kubernetes.io/cors-allow-methods: "GET, POST, PUT, DELETE, OPTIONS"
    nginx.ingress.kubernetes.io/cors-allow-headers: "DNT,User-Agent,X-Requested-With,If-Modified-Since,Cache-Control,Content-Type,Range,Authorization,X-User-Id,X-Session-Id"
    # Security Headers
    nginx.ingress.kubernetes.io/configuration-snippet: |
      more_set_headers "X-Frame-Options: DENY";
      more_set_headers "X-Content-Type-Options: nosniff";
      more_set_headers "X-XSS-Protection: 1; mode=block";
      more_set_headers "Referrer-Policy: strict-origin-when-cross-origin";
      more_set_headers "Permissions-Policy: camera=(), microphone=(), geolocation=()";
    # Real IP from Cloudflare/CDN
    nginx.ingress.kubernetes.io/use-forwarded-headers: "true"
    nginx.ingress.kubernetes.io/forwarded-for-header: "CF-Connecting-IP"
    # WebSocket support for real-time features
    nginx.ingress.kubernetes.io/proxy-http-version: "1.1"
    nginx.ingress.kubernetes.io/proxy-set-header: "Upgrade $http_upgrade"
    nginx.ingress.kubernetes.io/proxy-set-header: "Connection upgrade"
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - thanawy.app
        - api.thanawy.app
        - admin.thanawy.app
      secretName: thanawy-tls-secret
  rules:
    # Main Application
    - host: thanawy.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thanawy-service
                port:
                  number: 3000
    # API Subdomain
    - host: api.thanawy.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thanawy-service
                port:
                  number: 3000
    # Admin Subdomain
    - host: admin.thanawy.app
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: thanawy-service
                port:
                  number: 3000
---
# Service Definition
apiVersion: v1
kind: Service
metadata:
  name: thanawy-service
  labels:
    app: thanawy
  annotations:
    # For AWS NLB
    service.beta.kubernetes.io/aws-load-balancer-type: "nlb"
    service.beta.kubernetes.io/aws-load-balancer-cross-zone-load-balancing-enabled: "true"
    # Health check
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-protocol: "HTTP"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-path: "/api/healthz"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-port: "3000"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-interval: "15"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-timeout: "5"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-healthy-threshold: "2"
    service.beta.kubernetes.io/aws-load-balancer-healthcheck-unhealthy-threshold: "3"
spec:
  type: ClusterIP
  selector:
    app: thanawy
  ports:
    - name: http
      protocol: TCP
      port: 3000
      targetPort: 3000
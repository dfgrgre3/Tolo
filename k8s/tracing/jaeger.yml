apiVersion: v1
kind: Pod
metadata:
  name: jaeger
  labels:
    app: jaeger
spec:
  containers:
  - name: jaeger
    image: jaegertracing/all-in-one:1.35
    ports:
    - containerPort: 5775
      protocol: UDP
    - containerPort: 6831
      protocol: UDP
    - containerPort: 6832
      protocol: UDP
    - containerPort: 5778
      protocol: TCP
    - containerPort: 16686
      protocol: TCP
    - containerPort: 14268
      protocol: TCP
    - containerPort: 14250
      protocol: TCP
    - containerPort: 9411
      protocol: TCP
    securityContext:
      allowPrivilegeEscalation: false
      runAsNonRoot: true
      runAsUser: 1000
      capabilities:
        drop:
        - ALL
      readOnlyRootFilesystem: false
    resources:
      requests:
        memory: "256Mi"
        cpu: "100m"
      limits:
        memory: "512Mi"
        cpu: "500m"
    env:
    - name: COLLECTOR_ZIPKIN_HOST_PORT
      value: ":9411"

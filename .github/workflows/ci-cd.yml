name: Thanawy CI/CD Pipeline

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - uses: actions/checkout@f43a0e5ff2bd294095638e18286ca9a3d1956744
    
    - name: Setup Node.js
      uses: actions/setup-node@v4
      with:
        node-version: '20'
        cache: 'npm'
    
    - name: Setup Go
      uses: actions/setup-go@v5
      with:
        go-version: '1.25'
        cache-dependency-path: backend/go.sum

    - name: Install Frontend Dependencies
      run: npm ci
    
    - name: Install Backend Dependencies
      working-directory: ./backend
      run: go mod download

    - name: Run Frontend Linter
      run: npm run lint
    
    - name: Run Frontend Type Check
      run: npm run type-check
    
    - name: Run Frontend Tests
      run: npm test

    - name: Run Backend Tests
      working-directory: ./backend
      run: go test -v ./...

    - name: Run Backend Linter
      uses: golangci/golangci-lint-action@v6
      with:
        version: latest
        working-directory: backend

    - name: Security Audit (High and Critical)
      run: npm audit --audit-level=high
      # This will fail the build if high/critical vulnerabilities are found
    
    - name: Build Backend
      working-directory: ./backend
      run: go build -o main cmd/api/main.go

    - name: Build Frontend Docker Image
      run: docker build -t thanawy-app:${{ github.sha }} .
    
    - name: Build Backend Docker Image
      run: docker build -t thanawy-backend:${{ github.sha }} -f Dockerfile.backend .
    
    - name: Login to Docker Registry
      if: github.ref == 'refs/heads/main'
      uses: docker/login-action@v3
      with:
        username: ${{ secrets.DOCKER_USERNAME }}
        password: ${{ secrets.DOCKER_PASSWORD }}
    
    - name: Push Docker Images
      if: github.ref == 'refs/heads/main'
      run: |
        docker tag thanawy-app:${{ github.sha }} thanawy/thanawy-app:latest
        docker push thanawy/thanawy-app:latest
        docker tag thanawy-backend:${{ github.sha }} thanawy/thanawy-backend:latest
        docker push thanawy/thanawy-backend:latest

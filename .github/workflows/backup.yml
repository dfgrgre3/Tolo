name: Database Backup

on:
  schedule:
    - cron: '0 4 * * *'  # Daily at 4 AM Cairo time (UTC+2)
  workflow_dispatch:

jobs:
  backup:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install PostgreSQL client
        run: sudo apt-get update && sudo apt-get install -y postgresql-client

      - name: Create backup
        run: |
          TIMESTAMP=$(date +%Y%m%d_%H%M%S)
          pg_dump --host=${{ secrets.DB_HOST }} --port=5432 \
            --username=${{ secrets.DB_USER }} --dbname=${{ secrets.DB_NAME }} \
            --format=custom --compress=9 --no-owner \
            --file=thanawy_backup_$TIMESTAMP.sql
        env:
          PGPASSWORD: ${{ secrets.DB_PASSWORD }}

      - name: Upload backup to S3
        run: |
          aws s3 cp thanawy_backup_*.sql \
            s3://${{ secrets.BACKUP_S3_BUCKET }}/$(date +%Y/%m/%d)/ \
            --storage-class STANDARD_IA
        env:
          AWS_ACCESS_KEY_ID: ${{ secrets.AWS_ACCESS_KEY_ID }}
          AWS_SECRET_ACCESS_KEY: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
          AWS_REGION: me-south-1

      - name: Cleanup local backup
        run: rm -f thanawy_backup_*.sql

      - name: Notify on failure
        if: failure()
        uses: slackapi/slack-github-action@v1.26.0
        with:
          payload: |
            {
              "text": "❌ Database backup FAILED for ${{ github.repository }}"
            }
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}

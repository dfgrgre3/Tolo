version: '3.8'

services:
  postgres:
    image: postgres:15-alpine
    container_name: thanawy-postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-postgres}
      POSTGRES_DB: ${POSTGRES_DB:-thanawy}
    ports:
      - "${POSTGRES_PORT:-5432}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-postgres}"]
      interval: 10s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: thanawy-redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  backend:
    build:
      context: .
      dockerfile: Dockerfile.backend
    container_name: thanawy-backend-dev
    ports:
      - "8082:8082"
    environment:
      - PORT=8082
      - DATABASE_URL=${DATABASE_URL:-postgres://postgres:postgres@postgres:5432/thanawy?sslmode=disable}
      - JWT_SECRET=${JWT_SECRET:-super-secret-development-key-that-is-long-enough-and-secure-enough}
      - REDIS_URL=${REDIS_URL:-redis://redis:6379}
      - DB_AUTO_MIGRATE=true
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
